<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>stavR — Topology explorer (v3 concept)</title>
<!--
  stavR Topology — v3 concept mockup. Approved 2026-05-24, input for the
  topology-redesign BOM. A three-level level-of-detail explorer:
    Federation  — relay-hub mesh, each household collapses to one node
    Household   — #3 concentric, rings grouped by node type
    Ring        — collapsible (e.g. "MCP servers x30" -> individual nodes)
  Status = corner BADGE (not a halo). Home-node internals (Decisions,
  Events, trust-scope ledger) are NOT topology nodes. Build per #10:
  Cytoscape.js with compound / expand-collapse nodes.
-->
<style>
html,body{margin:0;background:#0a0b10;min-height:100%}
body{font-family:system-ui,-apple-system,sans-serif;padding:28px 20px;box-sizing:border-box}
.topo{margin:0 auto;max-width:1080px;background:#0f1118;border:1px solid #2a2e3c;border-radius:12px;overflow:hidden;color:#e6e8ef}
.topo .bar{display:flex;align-items:center;gap:13px;padding:11px 15px;border-bottom:1px solid #23262f;background:#14161f}
.topo .ttl{font-size:13.5px;font-weight:700}
.topo .seg{display:flex;border:1px solid #2f3340;border-radius:7px;overflow:hidden}
.topo .seg button{background:#171a24;color:#9498a6;border:0;padding:6px 13px;font-size:11.5px;cursor:pointer;font-family:inherit}
.topo .seg button.on{background:#c8693e;color:#1a0f08;font-weight:700}
.topo .hint{font-size:10.5px;color:#6f7484;margin-left:auto}
.topo .crumb{padding:7px 15px;font-size:10.5px;color:#8b8f9e;background:#12141c;border-bottom:1px solid #23262f}
.topo .crumb b{color:#cdd0da}
.topo svg{display:block;width:100%;height:auto;background:#0f1118;cursor:grab}
.topo svg.drag{cursor:grabbing}
.topo .lgd{display:flex;flex-wrap:wrap;gap:5px 15px;padding:9px 15px;border-top:1px solid #23262f;background:#14161f;font-size:10px;color:#8b8f9e}
.topo .lgd i{display:inline-block;width:9px;height:9px;border-radius:50%;border:2px solid;margin-right:5px;vertical-align:-1px}
.topo .clk{cursor:pointer}
</style>
</head>

<div class="seg"><button data-lvl="fed">Federation</button><button data-lvl="house" class="on">Household</button></div>
<span class="hint">drag to pan &middot; click a collapsed ring to expand</span>

<div class="crumb" id="crumb"><b>Household &middot; Kenneth</b> &mdash; daemon + models + tools, rings grouped by type</div>

<script>
(function(){
var svg=document.getElementById('svg'),vp=document.getElementById('vp');
var house=document.getElementById('house'),fed=document.getElementById('fed'),crumb=document.getElementById('crumb');
function setLvl(l){
 document.querySelectorAll('.seg button').forEach(function(x){x.classList.toggle('on',x.dataset.lvl===l);});
 house.style.display=l==='house'?'':'none';fed.style.display=l==='fed'?'':'none';
 crumb.innerHTML=l==='house'?'<b>Household &middot; Kenneth</b> &mdash; daemon + models + tools, rings grouped by type':'<b>Federation</b> &mdash; relay-hub mesh &middot; each household collapses to one node';
}
document.querySelectorAll('.seg button').forEach(function(b){b.onclick=function(){setLvl(b.dataset.lvl);};});
document.getElementById('ho-you').onclick=function(){setLvl('house');};
var col=document.getElementById('mcpCol'),exp=document.getElementById('mcpExp');
col.onclick=function(){col.style.display='none';exp.style.display='';};
document.getElementById('mcpClose').onclick=function(e){e.stopPropagation();exp.style.display='none';col.style.display='';};
var dx=0,dy=0,px,py,drag=false;
svg.addEventListener('mousedown',function(e){drag=true;px=e.clientX;py=e.clientY;svg.classList.add('drag');});
window.addEventListener('mousemove',function(e){if(!drag)return;var k=880/svg.clientWidth;dx+=(e.clientX-px)*k;dy+=(e.clientY-py)*k;px=e.clientX;py=e.clientY;vp.setAttribute('transform','translate('+dx+' '+dy+')');});
window.addEventListener('mouseup',function(){drag=false;svg.classList.remove('drag');});
})();
</script>
