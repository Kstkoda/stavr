<?xml version="1.0" encoding="UTF-8"?>
<!--
  Raido rune (ᚱ, U+16B1) — stavR brand mark, concept 6 (bare glyph).
  Geometry mirrors design-mockups/dock-icon-mockups.html `#rune` on a
  100-unit grid: stroke-width 11, round caps + joins, no tile / circle /
  halo. Status is conveyed by the colour of the rune itself
  (governor-polish BOM Cluster A, operator-approved exception to
  CLAUDE.md §5 which governs topology nodes).
  Default fill: iron-palette rust (#fa9c4c).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g fill="none" stroke="#fa9c4c" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <!-- vertical staff -->
    <line x1="38" y1="20" x2="38" y2="80"/>
    <!-- upper bow: staff-top → mid-right → staff-middle -->
    <path d="M38 20 L68 33 L38 50"/>
    <!-- lower leg: staff-middle → bottom-right -->
    <line x1="38" y1="50" x2="68" y2="80"/>
  </g>
</svg>
