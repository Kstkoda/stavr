<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>About stavR Governor</title>
<style>
  :root {
    --bg: #15151a;
    --panel: rgba(20, 22, 31, 0.55);
    --line: rgba(255, 255, 255, 0.08);
    --ink: #f0e8d8;
    --ink-dim: #8a857c;
    --rust: #fa9c4c;
    --link: #6fb4ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.55;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px 24px;
    min-height: 100vh;
  }
  .glyph {
    width: 96px;
    height: 96px;
    margin-bottom: 14px;
  }
  .name {
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.01em;
    margin: 0 0 2px;
  }
  .version-line {
    color: var(--ink-dim);
    font-size: 12px;
    margin: 0 0 18px;
    font-variant-numeric: tabular-nums;
  }
  .desc {
    color: var(--ink);
    text-align: center;
    max-width: 360px;
    margin: 0 0 18px;
    font-size: 12.5px;
    line-height: 1.6;
  }
  .meta {
    width: 100%;
    max-width: 360px;
    border-top: 1px solid var(--line);
    padding-top: 14px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 14px;
    font-size: 12px;
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }
  .meta dt { color: var(--ink-dim); }
  .meta dd { margin: 0; color: var(--ink); }
  .meta dd.unreachable { color: #d8a342; }
  .footer {
    margin-top: 18px;
    font-size: 12px;
    color: var(--ink-dim);
  }
  .footer a {
    color: var(--link);
    text-decoration: none;
    -webkit-user-select: text;
    user-select: text;
  }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <svg class="glyph" viewBox="0 0 100 100" aria-hidden="true">
    <g fill="none" stroke="var(--rust)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
      <line x1="38" y1="20" x2="38" y2="80"/>
      <path d="M38 20 L68 33 L38 50"/>
      <line x1="38" y1="50" x2="68" y2="80"/>
    </g>
  </svg>
  <h1 class="name">stavR Governor</h1>
  <p class="version-line" id="version-line">Governor v—</p>
  <p class="desc">
    Observes the stavR daemon over <code>/healthz</code>. The OS service supervises the daemon — the Governor never restarts it on its own.
  </p>
  <dl class="meta">
    <dt>Governor</dt><dd id="meta-gov">—</dd>
    <dt>Daemon</dt><dd id="meta-daemon">—</dd>
    <dt>Rust</dt><dd id="meta-rust">—</dd>
  </dl>
  <p class="footer">
    <a id="gh-link" href="https://github.com/stavR/stavr" target="_blank" rel="noopener">View on GitHub</a>
  </p>
<script>
  const params = new URLSearchParams(location.search);
  const gov = params.get('gov') || '';
  const daemon = params.get('daemon') || '';
  const rust = params.get('rust') || '';
  const repo = params.get('repo') || '';

  const setText = (id, value, dimClass) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = value || '—';
    if (dimClass && !value) el.classList.add(dimClass);
  };

  setText('meta-gov', gov ? `v${gov}` : '');
  setText('meta-daemon', daemon, 'unreachable');
  setText('meta-rust', rust);

  const verLine = document.getElementById('version-line');
  if (verLine) verLine.textContent = gov ? `Governor v${gov}` : 'Governor v—';

  const ghLink = document.getElementById('gh-link');
  if (ghLink && repo) ghLink.href = repo;
</script>
</body>
</html>
