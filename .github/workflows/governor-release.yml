name: governor-release

# Tag-triggered release pipeline for the stavR Governor binary + installer.
#
# Per ADR-038 §1+§2 and BOM v0.6.5.1 (Governor binary signing pipeline):
#   - Build the Governor binary for each platform/arch in the release matrix
#   - Generate a CycloneDX SBOM from Cargo.lock for each target
#   - Sign the binary AND the SBOM via Sigstore cosign keyless (GitHub Actions
#     OIDC -> Fulcio -> Rekor transparency log). No long-lived signing keys.
#   - Compute SHA256SUMS.txt across every artifact
#   - Upload everything to the GitHub Release for the tag
#
# Phase 4 of family-mode-phase-2-bom.md extends the pipeline so the
# Governor installer carries the daemon as a Tauri externalBin sidecar:
#   - Build the daemon SEA for the target via the shared
#     `build-daemon-sea` composite action.
#   - Place the SEA at `governor/binaries/stavr-daemon-<triple>[.exe]` —
#     this is exactly where Tauri's bundler expects an externalBin entry
#     declared as `binaries/stavr-daemon` to live.
#   - `cargo tauri build` then produces the platform-native installer
#     (.nsis on Windows, .dmg on macOS, .deb / .appimage on Linux) with
#     the daemon embedded. One signed installer per OS = a complete
#     stavR install (no `git clone && npm install` for family members).
#
# Triggered only on tag push matching the narrow pattern `v0.6.5*` so that
# daemon tags (e.g. `v0.6.6`, `v0.7-rc1`) do NOT accidentally fire a Governor
# release. v0.6.6+ Governor releases will add their own pattern or migrate
# to a unified `governor-v*` namespace; that's a follow-up decision (see
# BOM open question §2 — tag-only is the conservative default).
#
# Verifying the published artifacts (operator-side):
#
#   cosign verify-blob \
#     --certificate-identity-regexp 'https://github.com/Kstkoda/stavr/.*' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     --signature stavr-governor.exe.sig \
#     --certificate stavr-governor.exe.crt \
#     stavr-governor.exe
#
# A helper script (governor/scripts/verify-release.{ps1,sh}) wraps that
# command for one-shot operator use.

on:
  push:
    tags:
      - 'v0.6.5*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (must match v0.6.5* pattern)'
        required: true
        type: string

permissions:
  id-token: write     # OIDC token for cosign keyless signing (Fulcio)
  contents: write     # Create/update the GitHub Release for the tag
  attestations: write # Attestation API for build provenance

jobs:
  build-sign-release:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # `node_arch` / `bin_ext` feed the build-daemon-sea composite
          # action so the Tauri sidecar gets built in the same job as the
          # Governor binary. `installer_glob` is the bundle-output pattern
          # the `cargo tauri build` step produces for that platform.
          - {
              name: win-x86_64,
              runner: windows-2025,
              target: x86_64-pc-windows-msvc,
              ext: '.exe',
              node_arch: win-x64,
              bin_ext: '.exe',
              tauri_bundles: 'nsis',
              installer_glob: 'governor/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe',
            }
          - {
              name: win-aarch64,
              runner: windows-2025,
              target: aarch64-pc-windows-msvc,
              ext: '.exe',
              node_arch: win-arm64,
              bin_ext: '.exe',
              tauri_bundles: 'nsis',
              installer_glob: 'governor/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe',
            }
          - {
              name: macos-x86_64,
              runner: macos-14,
              target: x86_64-apple-darwin,
              ext: '',
              node_arch: darwin-x64,
              bin_ext: '',
              tauri_bundles: 'dmg',
              installer_glob: 'governor/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg',
            }
          - {
              name: macos-aarch64,
              runner: macos-14,
              target: aarch64-apple-darwin,
              ext: '',
              node_arch: darwin-arm64,
              bin_ext: '',
              tauri_bundles: 'dmg',
              installer_glob: 'governor/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg',
            }
          - {
              name: linux-x86_64,
              runner: ubuntu-24.04,
              target: x86_64-unknown-linux-gnu,
              ext: '',
              node_arch: linux-x64,
              bin_ext: '',
              tauri_bundles: 'deb,appimage',
              installer_glob: 'governor/target/x86_64-unknown-linux-gnu/release/bundle/{deb,appimage}/*',
            }

    env:
      BIN_NAME: stavr-governor${{ matrix.platform.ext }}
      RELEASE_DIR: governor/target/${{ matrix.platform.target }}/release

    steps:
      - uses: actions/checkout@v4

      # ----- Daemon SEA (the Tauri sidecar) -----------------------------
      # Build the daemon as a single executable for this target and stage
      # it where tauri-bundler will pick it up. tauri-bundler looks for
      # `binaries/stavr-daemon-<rust-target-triple>[.exe]` when the config
      # declares `externalBin: ["binaries/stavr-daemon"]`. Our matrix
      # already keys on the rust target triple, so the rename is direct.
      - name: Build daemon SEA (Tauri sidecar)
        id: sea
        uses: ./.github/actions/build-daemon-sea
        with:
          target-name: ${{ matrix.platform.name }}
          node-arch: ${{ matrix.platform.node_arch }}
          bin-ext: ${{ matrix.platform.bin_ext }}

      - name: Stage SEA as Tauri sidecar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p governor/binaries
          # Tauri externalBin naming: <name>-<rust-target-triple>[.ext].
          # At install time the bundler strips the triple suffix and
          # places the binary at `<resource-dir>/binaries/<name>[.ext]`.
          cp "${{ steps.sea.outputs.binary-path }}" \
             "governor/binaries/stavr-daemon-${{ matrix.platform.target }}${{ matrix.platform.bin_ext }}"
          ls -la governor/binaries/

      # ----- Governor Rust toolchain -----------------------------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install Linux system deps
        if: startsWith(matrix.platform.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            libfuse2

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            governor/target
          key: ${{ runner.os }}-${{ matrix.platform.target }}-cargo-${{ hashFiles('governor/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform.target }}-cargo-

      # ----- Governor binary (existing path) ----------------------------
      - name: Build release binary (frozen lockfile)
        # --locked: refuse to update Cargo.lock; SBOM accuracy depends on this.
        working-directory: governor
        run: cargo build --release --locked --target ${{ matrix.platform.target }}

      # ----- Tauri-bundled installer (Phase 4) -------------------------
      # `cargo tauri build` runs the bundler, which picks up the staged
      # externalBin and embeds it. Cargo is built fresh inside this step
      # because the bundler invokes its own cargo build with bundling
      # metadata — the previous `cargo build` is the SBOM source of truth
      # (frozen Cargo.lock) and not strictly required by tauri build, but
      # keeping it preserves the existing signing pipeline below for the
      # raw governor binary.
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build Tauri installer
        working-directory: governor
        run: |
          cargo tauri build \
            --target ${{ matrix.platform.target }} \
            --bundles ${{ matrix.platform.tauri_bundles }}

      # ----- SBOM ------------------------------------------------------
      - name: Install cargo-cyclonedx (SBOM generator)
        # cargo-cyclonedx pinned to a known version to keep SBOM output stable.
        # Bumps go through Renovate (per ADR-038 §4) once that pillar lands.
        run: cargo install cargo-cyclonedx --version 0.5.7 --locked

      - name: Generate CycloneDX SBOM
        working-directory: governor
        shell: bash
        run: |
          cargo cyclonedx --target ${{ matrix.platform.target }} --format json
          # cargo-cyclonedx emits <crate>.cdx.json next to each Cargo.toml.

      - name: Stage release artifacts
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          STAGE="${RUNNER_TEMP}/release-${{ matrix.platform.name }}"
          mkdir -p "${STAGE}"
          # Governor binary
          cp "${RELEASE_DIR}/${BIN_NAME}" "${STAGE}/${BIN_NAME}"
          # SBOM (cargo-cyclonedx emits stavr-governor.cdx.json at the crate root)
          if [ -f "governor/stavr-governor.cdx.json" ]; then
            cp "governor/stavr-governor.cdx.json" "${STAGE}/stavr-governor.sbom.cdx.json"
          else
            # Fallback: walk the workspace for a *.cdx.json file
            SBOM=$(find governor -maxdepth 3 -name '*.cdx.json' -print -quit)
            cp "${SBOM}" "${STAGE}/stavr-governor.sbom.cdx.json"
          fi
          # Tauri-bundled installer(s). Use bash globbing — installer_glob
          # may expand to multiple files (e.g. Linux .deb AND .AppImage).
          shopt -s nullglob globstar
          INSTALLER_FILES=( ${{ matrix.platform.installer_glob }} )
          if [ ${#INSTALLER_FILES[@]} -eq 0 ]; then
            echo "::error::No installer files matched ${{ matrix.platform.installer_glob }}"
            exit 1
          fi
          for f in "${INSTALLER_FILES[@]}"; do
            cp "${f}" "${STAGE}/$(basename "${f}")"
          done
          # Daemon SEA (raw, for operators who want the binary without an
          # installer). Already named with the rust target triple in the
          # stage step above.
          cp "governor/binaries/stavr-daemon-${{ matrix.platform.target }}${{ matrix.platform.bin_ext }}" \
             "${STAGE}/stavr-daemon-${{ matrix.platform.target }}${{ matrix.platform.bin_ext }}"
          echo "stage_dir=${STAGE}" >> "${GITHUB_OUTPUT}"
          ls -la "${STAGE}/"

      # ----- Signing (cosign keyless, every artifact) -------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign Governor binary (cosign keyless)
        working-directory: ${{ steps.stage.outputs.stage_dir }}
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign-blob --yes \
            --output-signature "${BIN_NAME}.sig" \
            --output-certificate "${BIN_NAME}.crt" \
            "${BIN_NAME}"

      - name: Sign SBOM (cosign keyless)
        working-directory: ${{ steps.stage.outputs.stage_dir }}
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign-blob --yes \
            --output-signature stavr-governor.sbom.sig \
            --output-certificate stavr-governor.sbom.crt \
            stavr-governor.sbom.cdx.json

      - name: Sign daemon SEA (cosign keyless)
        working-directory: ${{ steps.stage.outputs.stage_dir }}
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: '1'
          DAEMON_NAME: stavr-daemon-${{ matrix.platform.target }}${{ matrix.platform.bin_ext }}
        run: |
          cosign sign-blob --yes \
            --output-signature "${DAEMON_NAME}.sig" \
            --output-certificate "${DAEMON_NAME}.crt" \
            "${DAEMON_NAME}"

      - name: Sign installer(s) (cosign keyless)
        working-directory: ${{ steps.stage.outputs.stage_dir }}
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Sign every installer artifact that isn't itself a cosign output
          # or the governor/daemon binaries already signed above.
          for f in *.exe *.msi *.dmg *.deb *.AppImage; do
            case "${f}" in
              "${BIN_NAME}"|stavr-daemon-*) continue ;;
            esac
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.crt" \
              "${f}"
          done

      - name: Compute SHA256SUMS
        working-directory: ${{ steps.stage.outputs.stage_dir }}
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > SHA256SUMS.txt
          else
            # Windows runner: PowerShell Get-FileHash via the shell wrapper
            powershell -NoProfile -Command "Get-ChildItem -File | Where-Object { \$_.Name -ne 'SHA256SUMS.txt' } | ForEach-Object { \$h = (Get-FileHash -Algorithm SHA256 -Path \$_.FullName).Hash.ToLower(); \"$h  \$(\$_.Name)\" } | Out-File -Encoding ASCII SHA256SUMS.txt"
          fi
          cat SHA256SUMS.txt

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ steps.stage.outputs.stage_dir }}/*
          fail_on_unmatched_files: true
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}

      - name: Upload artifacts as workflow artifact (audit trail)
        uses: actions/upload-artifact@v4
        with:
          name: governor-release-${{ matrix.platform.name }}
          path: ${{ steps.stage.outputs.stage_dir }}/*
          retention-days: 90
