name: governor-build

# Cross-platform build matrix for the stavR Governor.
#
# Per v0.6.5 BOM P1 acceptance: produces artifacts for win-x86_64,
# win-aarch64, macos-x86_64, macos-aarch64, linux-x86_64. PR #2 will extend
# this with the Tauri bundler for native installers (.msi / .dmg / .deb).

on:
  push:
    branches: [main]
    paths:
      - 'governor/**'
      - '.github/workflows/governor-build.yml'
  pull_request:
    paths:
      - 'governor/**'
      - '.github/workflows/governor-build.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: governor

jobs:
  build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # macos-x86_64 (Intel) intentionally NOT in this per-push matrix — the
          # GitHub-hosted macos-13 runner pool is heavily oversubscribed on the
          # free tier (10h+ queues observed 2026-05-17/18). Intel Mac builds
          # still happen on tag release via governor-release.yml where the wait
          # is acceptable. macos-aarch64 (M1+) uses its own runner pool with
          # short queues, so it stays in per-push.
          - { name: win-x86_64,    runner: windows-latest, target: x86_64-pc-windows-msvc }
          - { name: win-aarch64,   runner: windows-latest, target: aarch64-pc-windows-msvc }
          - { name: macos-aarch64, runner: macos-14,       target: aarch64-apple-darwin }
          - { name: linux-x86_64,  runner: ubuntu-22.04,   target: x86_64-unknown-linux-gnu }

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install Linux system deps
        if: startsWith(matrix.platform.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Set up Python for icon generation
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Pillow
        run: python -m pip install --quiet Pillow

      - name: Regenerate icons from SVG source
        run: python scripts/gen_icons.py

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            governor/target
          key: ${{ runner.os }}-${{ matrix.platform.target }}-cargo-${{ hashFiles('governor/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform.target }}-cargo-

      - name: Run unit tests (native target only)
        if: matrix.platform.target == 'x86_64-pc-windows-msvc' || matrix.platform.target == 'x86_64-unknown-linux-gnu' || matrix.platform.target == 'aarch64-apple-darwin'
        run: cargo test --release --target ${{ matrix.platform.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: stavr-governor-${{ matrix.platform.name }}
          path: |
            governor/target/${{ matrix.platform.target }}/release/stavr-governor
            governor/target/${{ matrix.platform.target }}/release/stavr-governor.exe
          if-no-files-found: ignore
          retention-days: 14
