name: CI

on:
  push:
    branches: [main]
  # Run on every PR regardless of base ref — chained PRs (e.g. [cc-mega] stacks
  # whose base is another open PR's head, not main) still need CI to verify the
  # production-ready bar against their actual base.
  pull_request:

# Cancel in-progress runs on new pushes to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Verify dist/ output exists
        shell: bash
        run: |
          test -f dist/cli.js
          test -f dist/server.js
          test -f dist/shim.js
          test -f dist/daemon.js
