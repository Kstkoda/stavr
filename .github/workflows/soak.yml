name: soak

# Bombardment Phase 2 — soak / endurance.
#
# Two suites run in the same job, both gated by STAVR_RUN_SOAK=long:
#
#   - tests/soak/leak-soak.test.ts (the original v0.6.x regression guard;
#     serial event pump + dashboard fetch, asserts ceiling + retention)
#   - tests/soak/multi-mode-soak.test.ts (Phase 2 — boots an in-process
#     daemon, spawns bombardment/load-runner.mjs as a subprocess against
#     it, runs the Phase 1 oracle layer continuously, asserts on RSS
#     ceiling + slope, baseline return for broker.sessionCount +
#     subscriptionCount, heap per-class diff, event-loop-lag percentiles)
#
# Multi-mode soak is the `full` verification window: 30 min of mixed
# load with sample-window-sec=60s. STAVR_SOAK_MINUTES overrides the
# duration when an operator wants longer/shorter (workflow_dispatch
# input or env). Seeded via STAVR_HARDENING_SEED so any failure replays.
#
# Bombardment artifacts (heap snapshots, per-class diff, run-summary,
# load-runner CSV) are uploaded on every run (not just failure) so
# trend analysis across weeks is possible.
#
# Linux-only: heap snapshots are large; Windows runners run the regular
# matrix via ci.yml.

on:
  schedule:
    # Sunday 04:00 UTC. After main has the week's merges + the dashboard
    # is most likely idle, so the snapshot dumps don't compete with anything.
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      seed:
        description: 'STAVR_HARDENING_SEED (omit for a fresh seed; the run-summary records the resolved seed)'
        required: false
        type: string
      minutes:
        description: 'STAVR_SOAK_MINUTES override (multi-mode-soak duration; default 30; capped at 35 — bump timeout-minutes for longer)'
        required: false
        type: string

jobs:
  soak:
    runs-on: ubuntu-latest
    # 60 min cap — leak-soak (~15 min) + multi-mode-soak (~30 min default)
    # + build + setup + slack. workflow_dispatch with --minutes overrides
    # may need a manual bump if the operator goes beyond 45 min.
    timeout-minutes: 60
    env:
      STAVR_RUN_SOAK: long
      STAVR_SOAK_RSS_CEILING_MB: '600'
      STAVR_HARDENING_SEED: ${{ inputs.seed }}
      STAVR_SOAK_MINUTES: ${{ inputs.minutes }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26.x'
          cache: 'npm'
      # Validate the dispatch `minutes` input against the job timeout so
      # an operator-supplied value that would overrun the 60-min cap fails
      # fast (with a clear message) instead of getting silently killed at
      # minute 60 — which would also lose any in-flight artifact upload.
      # Budget: ~5 min setup/build + ~15 min leak-soak + multi-mode value
      # + ~2 min teardown ≈ multi-mode + 22 min. With 60-min cap that
      # leaves a 38-min ceiling on the multi-mode duration; we cap at 35
      # for safety margin. Operators wanting longer must bump
      # `timeout-minutes` above in the same edit.
      - name: Validate workflow_dispatch minutes input
        if: github.event_name == 'workflow_dispatch' && inputs.minutes != ''
        run: |
          MINS="${{ inputs.minutes }}"
          if ! [[ "$MINS" =~ ^[0-9]+$ ]]; then
            echo "::error::minutes input '$MINS' is not a non-negative integer"
            exit 1
          fi
          if [ "$MINS" -gt 35 ]; then
            echo "::error::minutes=$MINS would overrun the 60-min timeout-minutes cap (budget: minutes + 22 ≈ ${MINS}+22 vs cap 60). Bump timeout-minutes in the workflow first."
            exit 1
          fi
          echo "minutes=$MINS validated against 35-min ceiling"
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Run soak (leak-soak + multi-mode-soak)
        run: npx vitest run tests/soak --reporter=verbose
      - name: Upload bombardment artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-bombardment-artifacts
          path: |
            bombardment/artifacts/**
            tmp/heap-snapshots/*.heapsnapshot
          retention-days: 14
          if-no-files-found: ignore
