name: bombardment-docker

# Bombardment Phase 3-4 — build the daemon container image, stand up
# the federation topology, and run the chaos slices.
#
# Re-armed as a gating CI check at the close of the chaos-debug BOM
# (proposed/bombardment-chaos-debug-bom.md Phase 5, 2026-05-25). Every
# step in this workflow blocks the job on failure EXCEPT the two Pumba
# chaos slices ("Run Pumba chaos slice" 3c and "Run network-chaos
# slice" 4b) — see their `continue-on-error: true` comments for why
# (the Pumba 0.11.7 tc-container exec race makes them silent no-ops on
# every Docker host we've tried, including this Linux runner; arming a
# no-op as a required gate would lie about coverage). The kill-recovery
# (4a) and projection-corruption (4c) slices block normally — both
# verified green locally + in CI before this commit.
#
# What this catches:
#   - Phase 3a: daemon ships as a Docker image, boots, /healthz passes,
#     /status.version == package.json.
#   - Cross-machine packaging drift (a dep that npm-installs on the
#     dev host but doesn't compile inside the bookworm-slim base, the
#     better-sqlite3 native-build trap, the SEA bundler's quirks, etc.)
#   - Phase 3b: docker compose stands the federation topology up and
#     each peer's /api/federation/peers lists the others; the
#     mDNS-blocked subnet shape is exercised here.
#   - Phase 3c: Pumba sidecar wires netem latency/loss (best-effort —
#     see the 3c + 4b carve-out below) and the federation oracles still
#     pass at the configured budget.
#   - Phase 4a: SIGKILL of peer-a's daemon process from inside the
#     container; the restart policy brings the container back +
#     startupDecisionSweep recovers the in-flight decision.
#   - Phase 4c: out-of-band projection corruption is detectable by
#     replaying the event log; freshness-gated convergence oracle
#     surfaces a stuck-degraded peer (the multi-homed peer-client bug
#     fixed in this BOM's Phase 4 follow-up).
#
# Fast on cache hits (a few minutes) — the Dockerfile is structured so
# `npm ci` is the slow layer and only re-runs when package*.json
# change. Buildx + GHA cache keeps the runtime under 5 min in the
# common case.

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'bombardment/docker/**'
      - 'bombardment/compose/**'
      - 'bombardment/federation/**'
      - 'bombardment/chaos/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'src/**'
      - '.github/workflows/bombardment-docker.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'bombardment/docker/**'
      - 'bombardment/compose/**'
      - 'bombardment/federation/**'
      - 'bombardment/chaos/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'src/**'
      - '.github/workflows/bombardment-docker.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    name: Build image + /healthz + /status smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read package version
        id: pkg
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "[bombardment-docker] package.json version=${version}"

      - name: Build stavr:ci image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: stavr:ci
          cache-from: type=gha,scope=bombardment-docker
          cache-to: type=gha,scope=bombardment-docker,mode=max

      - name: Boot container + verify /healthz + /status
        env:
          EXPECTED_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          set -euo pipefail

          # Run on a fresh volume so STAVR_HOME starts clean.
          docker run -d --name stavr-smoke \
            -p 17777:7777 \
            -e STAVR_ALLOW_NON_LOCAL_WITHOUT_AUTH=1 \
            -e STAVR_PEER_ID=ci-smoke \
            -e STAVR_LOG_FORMAT=json \
            stavr:ci

          # Wait for the HEALTHCHECK to flip the container to "healthy",
          # not just for /healthz to respond. This validates the docker-
          # level health contract too.
          for i in $(seq 1 60); do
            status=$(docker inspect --format='{{.State.Health.Status}}' stavr-smoke 2>/dev/null || echo "unknown")
            echo "[smoke] healthcheck status=${status} (attempt ${i})"
            if [ "${status}" = "healthy" ]; then
              break
            fi
            if [ "${status}" = "unhealthy" ]; then
              echo "[smoke] container reported unhealthy; dumping logs"
              docker logs stavr-smoke || true
              exit 1
            fi
            sleep 2
          done

          if [ "${status}" != "healthy" ]; then
            echo "[smoke] healthcheck never went healthy"
            docker logs stavr-smoke || true
            exit 1
          fi

          # /healthz from the outside.
          healthz=$(curl --fail --silent --show-error http://127.0.0.1:17777/healthz)
          echo "[smoke] /healthz: ${healthz}"

          # /status — version contract is the regression guard for
          # recon defect #5 (the "0.1.0 forever" bug) applied to the
          # container build path. If the bake-at-build-time pipeline
          # ever regresses inside the Dockerfile this assertion catches it.
          status_body=$(curl --fail --silent --show-error http://127.0.0.1:17777/status)
          echo "[smoke] /status: ${status_body}"

          version=$(echo "${status_body}" | node -e "let s=''; process.stdin.on('data',d=>s+=d); process.stdin.on('end',()=>{const j=JSON.parse(s); console.log(j.version);});")
          echo "[smoke] reported version=${version}, expected=${EXPECTED_VERSION}"
          if [ "${version}" != "${EXPECTED_VERSION}" ]; then
            echo "[smoke] FAIL: /status.version mismatch"
            docker logs stavr-smoke || true
            exit 1
          fi

      - name: Tear down smoke container
        if: always()
        run: |
          docker logs stavr-smoke || true
          docker rm -f stavr-smoke || true

  federation-compose:
    name: docker compose federation topology + oracles
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build-and-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '26.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build stavr:ci image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: stavr:ci
          cache-from: type=gha,scope=bombardment-docker

      - name: Stand up the compose federation
        run: |
          set -euo pipefail
          cd bombardment/compose
          # chaos.yml overlay supplies the /app/bombardment-chaos bind-
          # mount the Phase 4 runners need; restrict `up` to the three
          # peer services so the pumba kill sidecar declared alongside
          # the mount does NOT start here (the kill-recovery oracle
          # drives the kill itself via `docker kill`).
          # --remove-orphans clears stale containers left by a prior
          # cancelled run before they collide on container names.
          docker compose -f docker-compose.yml -f chaos.yml up -d \
            --remove-orphans peer-a peer-b hub
          docker compose ps

      - name: Run federation oracles
        run: |
          set -euo pipefail
          # Wait for all peer containers to report healthy via docker
          # before letting the oracle runner hit them. Catches the
          # "race the daemon's HTTP listener" class of flake.
          node bombardment/federation/wait-for-healthy.mjs

          # Run the federation oracle set against the compose topology.
          # Each oracle is independent + asserts a single invariant;
          # the runner aggregates pass/fail and exits non-zero on any
          # violation.
          node bombardment/federation/run-oracles.mjs

      - name: Run Pumba chaos slice
        # Phase 3c — netem latency injection at the LAN edge. Oracles
        # must still pass under a modest impairment budget; harsher
        # partition + kill is Phase 4.
        #
        # Non-blocking: same Pumba 0.11.7 `--tc-image=gaiadocker/iproute2`
        # race the 4b slice carries (see that step for the full
        # diagnosis). The tc-container exits before Pumba's
        # `docker exec` lands, sidecar exits non-zero with
        #   "failed to create tc-container exec: container ... is not running"
        # and the netem rule never installs. The runner's WARN emits
        # the pumba log excerpt when this happens; oracles then run
        # against UN-impaired traffic and trivially "pass" — gating on
        # a green no-op would lie about chaos coverage. Promoting to
        # required check is gated on the same three upstream fixes
        # listed in the 4b carve-out: (a) bump Pumba past the race,
        # (b) tc-image with a long-running entrypoint, (c) install
        # iproute2 directly into stavr:ci and drop --tc-image.
        continue-on-error: true
        run: |
          set -euo pipefail
          node bombardment/federation/run-pumba-slice.mjs

      - name: Run kill-recovery chaos slice
        # Phase 4a — SIGKILL peer-a, verify (a) the restart-policy
        # brings it back (RestartCount increments + /healthz returns)
        # and (b) the in-flight decision is recovered by
        # startupDecisionSweep. The originally-specified third
        # invariant (SSE since_id reconnect across the kill) was
        # dropped — see proposed/bombardment-chaos-debug-bom.md
        # "Decision (locked 2026-05-25)". Re-uses the existing
        # compose topology — no new image build, no new container churn.
        run: |
          set -euo pipefail
          node bombardment/chaos/run-kill-slice.mjs

      - name: Run network-chaos slice (heavier impairment)
        # Phase 4b — 500ms ±100ms latency spike on peer-a + 10% loss
        # on peer-b via Pumba netem. The Phase 3d federation oracles
        # must still pass under this heavier budget (Phase 3c covers
        # the modest budget; Phase 4b is the "WAN-going-bad" envelope).
        #
        # Non-blocking: Pumba 0.11.7's `--tc-image=gaiadocker/iproute2`
        # pattern races (the tc-container exits before Pumba's
        # `docker exec` lands), so on every Docker host we've tested
        # (Docker Desktop on Windows AND ubuntu-latest GHA runners)
        # both pumba sidecars exit non-zero with
        #   "failed to create tc-container exec: container ... is not running"
        # and the netem rule never installs. The slice's runner then
        # runs the oracles against UN-impaired traffic and "passes" —
        # so gating on this step today would lie about chaos coverage.
        # The runner already emits a loud WARN with the pumba log
        # excerpt when this happens; promoting to required check is
        # blocked on either (a) bumping Pumba past the race, (b)
        # switching to a tc-image with a long-running entrypoint, or
        # (c) installing iproute2 directly into stavr:ci and dropping
        # --tc-image. Tracked in proposed/bombardment-chaos-debug-bom.md
        # Phase 5 follow-up notes; 4a + 4c stay blocking.
        continue-on-error: true
        run: |
          set -euo pipefail
          node bombardment/chaos/run-netchaos-slice.mjs

      - name: Run projection-corruption + rebuild-from-log slice
        # Phase 4c — seed fixture (decision rows + matching events),
        # mutate the projection out of band, replay events to detect
        # the drift. Proves the event log is the source of truth + the
        # rebuild path is sound. Runs entirely against peer-a; leaves
        # other peers untouched.
        run: |
          set -euo pipefail
          node bombardment/chaos/run-projection-corruption.mjs

      - name: Collect compose logs on failure
        if: failure()
        run: |
          mkdir -p bombardment-artifacts
          cd bombardment/compose
          docker compose ps > ../../bombardment-artifacts/ps.txt || true
          docker compose logs --no-color > ../../bombardment-artifacts/compose.log || true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bombardment-docker-failure
          path: bombardment-artifacts/
          retention-days: 14

      - name: Tear down compose
        if: always()
        run: |
          cd bombardment/compose
          # `down -v` against the full overlay set so any chaos / netchaos
          # sidecars left from a failed slice are torn down along with the
          # base topology — otherwise stale pumba containers can collide
          # on container names with the next workflow run.
          docker compose \
            -f docker-compose.yml \
            -f chaos.yml \
            -f netchaos.yml \
            -f pumba.yml \
            down -v --remove-orphans || true
