# Local-dev Prometheus config for stavr. Scrapes /metrics on the daemon's
# default port (7777). If you've changed the port in your local config,
# update the target below.

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: stavr-daemon
    metrics_path: /metrics
    static_configs:
      - targets:
          # `host.docker.internal` resolves to the docker host on Docker
          # Desktop / OrbStack. On native Linux with the `extra_hosts`
          # `host-gateway` mapping, this works the same way.
          - "host.docker.internal:7777"
